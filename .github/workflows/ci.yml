name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Format Check
        run: npm run format:check
      - name: Unit Test
        run: npm run test

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
      - name: Test + Coverage Report + Format Check
        run: gradle -p backend test jacocoTestReport spotlessCheck
